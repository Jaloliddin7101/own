- name: Terraform Apply
  if: github.ref == 'refs/heads/dev'
  run: terraform apply -var-file="dev/terraform.tfvars" -auto-approve
  env:
    GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_DEV }}  # Use dev credentials

- name: Terraform Apply
  if: github.ref == 'refs/heads/staging'
  run: terraform apply -var-file="staging/terraform.tfvars" -auto-approve
  env:
    GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_STAGING }}  # Use staging credentials

- name: Terraform Apply
  if: github.ref == 'refs/heads/main'
  run: terraform apply -var-file="prod/terraform.tfvars" -auto-approve
  env:
    GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_PROD }}  # Use prod credentials
name: Terraform Deploy

on:
  push:
    branches:
      - dev      # Trigger when pushing to the dev branch
      - staging  # Trigger when pushing to the staging branch
      - main     # Trigger when pushing to the main branch (for prod)

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.5.7  # Specify the version of Terraform you're using

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
        run: terraform apply -var-file="terraform.tfvars" -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}  # Service account credentials

