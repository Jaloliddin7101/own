name: Terraform Deploy

on:
  push:
    branches:
      - dev      # Trigger when pushing to the dev branch
      - staging  # Trigger when pushing to the staging branch
      - main     # Trigger when pushing to the main branch (for prod)

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.5.7  # Specify the version of Terraform you're using

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan for Dev
        if: github.ref == 'refs/heads/dev'
        run: terraform plan -var-file="terraform/dev/terraform.tfvars"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_DEV }}

      - name: Terraform Plan for Staging
        if: github.ref == 'refs/heads/staging'
        run: terraform plan -var-file="terraform/staging/terraform.tfvars"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_STAGING }}

      - name: Terraform Plan for Prod
        if: github.ref == 'refs/heads/main'
        run: terraform plan -var-file="terraform/prod/terraform.tfvars"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_PROD }}

      - name: Terraform Apply for Dev
        if: github.ref == 'refs/heads/dev'
        run: terraform apply -var-file="terraform/dev/terraform.tfvars" -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_DEV }}

      - name: Terraform Apply for Staging
        if: github.ref == 'refs/heads/staging'
        run: terraform apply -var-file="terraform/staging/terraform.tfvars" -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_STAGING }}

      - name: Terraform Apply for Prod
        if: github.ref == 'refs/heads/main'
        run: terraform apply -var-file="terraform/prod/terraform.tfvars" -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_PROD }}

